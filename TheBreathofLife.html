<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheBreathofLife_品牌介紹</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      margin: 0; 
      padding: 0; 
      font-family: 'Noto Serif TC', serif; 
      background-color: #ffffff; 
      letter-spacing: 0.1em;
      overflow-x: hidden;
    }
    
    .video-section {
      background-color: #031d06; 
      padding: 60px 0;           
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .video-outer {
      width: 90%;
      max-width: 400px; 
      margin: 0 auto;
    }

    .video-container {
      position: relative;
      width: 100%;

      padding-top: 177.77%; 
      height: 0;
      overflow: hidden;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
      border: none;
    }

    .banner { 
      position: relative; 
      width: 100%; 
      height: 500px; 
      background: url("https://cdn.jsdelivr.net/gh/sonoshop/shop-img@main/TheBreathofLife_image_1.png") center/cover no-repeat; 
    }
    .banner .logo { 
      position: absolute; 
      top: 5%; 
      left: 73%; 
      transform: translateX(-50%); 
      width: 330px; 
      opacity: 0; 
      animation: fadeIn 1.5s forwards; 
    }
    @keyframes fadeIn { to { opacity: 1; } }

    .intro-block { 
      background-color: #031d06; 
      color: #ffffff; 
      text-align: center; 
      padding: 80px 20px; 
      font-size: 20px; 
      line-height: 1.8; 
      letter-spacing: 0.2em; 
    }
    img { display: block; width: 100%; height: auto; }

    .fade-in-img, .fade-in-text { 
      opacity: 0; 
      transform: translateY(30px); 
      transition: 1.2s cubic-bezier(0.22, 1, 0.36, 1); 
    }
    .visible { opacity: 1; transform: translateY(0); }

    .faq-section { 
      background-color: #630101; 
      color: #ffffff; 
      padding: 60px 20px;
    }
    .accordion { max-width: 800px; margin: 0 auto; }
    .accordion-item { border-bottom: 1px solid #ffffff55; padding: 20px 0; }
    .accordion-question { 
      font-weight: bold; 
      cursor: pointer; 
      display: flex; 
      justify-content: space-between; 
      font-size: 20px; 
      align-items: center;
    }
    .accordion-answer { 
      max-height: 0; 
      overflow: hidden; 
      transition: all 0.4s ease; 
      opacity: 0; 
      background-color: #4a0000; 
      line-height: 1.6;
    }
    .accordion-answer.open { 
      max-height: 300px; 
      opacity: 1; 
      padding: 20px; 
      margin-top: 15px; 
      border-radius: 8px;
    }

    @media (max-width: 768px) {
      .banner { height: 280px; }
      .banner .logo { width: 180px; left: 50%; }
      .intro-block { font-size: 16px; padding: 50px 15px; }
      .accordion-question { font-size: 18px; }
    }
  </style>
</head>
<body>

  <div class="banner">
    <img class="logo" src="https://cdn.jsdelivr.net/gh/sonoshop/shop-img@main/TheBreathofLife_logo.png" alt="Logo" />
  </div>

  <div class="intro-block">
    <div class="fade-in-text">
        THE BREATH OF LIFE 是來自澳洲昆士蘭的天然草本香氛品牌<br>
        希望把「自然的舒緩」帶進每個人的日常。
    </div>
  </div>

  <img src="https://cdn.jsdelivr.net/gh/sonoshop/shop-img@main/TheBreathofLife_image_2.png" class="fade-in-img" />

  <div class="intro-block">
    <div class="fade-in-text">
      THE BREATH OF LIFE 適合想要讓身心更舒暢的人，<br>「大自然的氣息，是最溫柔的療癒。」
    </div>
  </div>

  <img src="https://cdn.jsdelivr.net/gh/sonoshop/shop-img@main/TheBreathofLife_image_3.png" class="fade-in-img" />

  <div class="video-section">
    <div class="video-outer">
      <div class="video-container">
        <iframe 
          src="https://www.facebook.com/plugins/video.php?href=https%3A%2F%2Fwww.facebook.com%2Freel%2F1444778976772947%2F&show_text=false" 
          scrolling="no" 
          allowfullscreen="true" 
          allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
        </iframe>
      </div>
    </div>
  </div>
  
  <div class="faq-section">
    <div class="accordion">
      <div class="accordion-item">
        <div class="accordion-question">Q：產品要怎麼保存？ <span>＋</span></div>
        <div class="accordion-answer">A：避免陽光直射，建議放在陰涼乾燥處，並於半年至一年內使用完畢以享有最佳香氣。</div>
      </div>
      <div class="accordion-item">
        <div class="accordion-question">Q：孕婦或孩童可以使用嗎？ <span>＋</span></div>
        <div class="accordion-answer">A：我們的產品使用天然精油，但因每個人體質不同，建議孕婦或三歲以下孩童使用前先諮詢專業醫師。</div>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      // 滾動動畫觀察器
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target); 
          }
        });
      }, { threshold: 0.15 });

      document.querySelectorAll('.fade-in-img, .fade-in-text').forEach(el => observer.observe(el));

      document.querySelectorAll('.accordion-question').forEach(q => {
        q.addEventListener('click', () => {
          const ans = q.nextElementSibling;
          const isOpen = ans.classList.contains('open');
          
          document.querySelectorAll('.accordion-answer').forEach(a => {
            a.classList.remove('open');
            a.previousElementSibling.querySelector('span').textContent = '＋';
          });

          if (!isOpen) {
            ans.classList.add('open');
            q.querySelector('span').textContent = '－';
          }
        });
      });
    });
  </script>
</body>
</html>
